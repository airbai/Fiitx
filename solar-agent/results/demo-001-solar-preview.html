<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太阳能板实景效果 - 上海佘山月湖山庄独栋别墅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  .header h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
  .header p { color: #666; font-size: 14px; }
  .scene {
    position: relative;
    width: 100%;
    height: 400px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #90EE90 40.1%, #228B22 100%);
    margin-bottom: 24px;
  }
  /* 太阳 */
  .sun {
    position: absolute;
    top: 30px;
    right: 60px;
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #FFD700, #FFA500);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
    50% { box-shadow: 0 0 80px rgba(255, 215, 0, 0.9); }
  }
  /* 房屋主体 */
  .house {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 180px;
  }
  .house-body {
    position: absolute;
    bottom: 0;
    left: 5%;
    width: 90%;
    height: 120px;
    background: linear-gradient(135deg, #D4A574, #C4956A);
    border-radius: 4px 4px 0 0;
    border: 2px solid #B8860B;
  }
  .roof {
    position: absolute;
    bottom: 120px;
    left: 0;
    width: 100%;
    height: 70px;
    background: linear-gradient(135deg, #8B4513, #A0522D);
    clip-path: polygon(0% 100%, 10% 0%, 90% 0%, 100% 100%);
  }
  /* 太阳能板 */
  .solar-panels {
    position: absolute;
    bottom: 140px;
    left: 15%;
    width: 70%;
    height: 45px;
    display: flex;
    gap: 4px;
    justify-content: center;
    z-index: 2;
  }
  .panel {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #1a237e, #283593, #1a237e);
    border: 2px solid #0d47a1;
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.2) 0%,
      rgba(255,255,255,0.05) 30%,
      transparent 50%,
      rgba(255,255,255,0.1) 70%
    );
  }
  .panel::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 2px;
    background: rgba(255,255,255,0.15);
  }
  .grid-line-v {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(255,255,255,0.1);
  }
  .grid-line-h {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }
  /* 门窗 */
  .window {
    position: absolute;
    width: 30px;
    height: 40px;
    background: linear-gradient(135deg, #87CEEB, #B0E0E6);
    border: 2px solid #8B4513;
    border-radius: 2px;
  }
  .door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 35px;
    height: 65px;
    background: linear-gradient(135deg, #8B4513, #654321);
    border-radius: 3px 3px 0 0;
  }
  /* 信息面板 */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .info-item {
    background: #f5f7fa;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
  }
  .info-item .label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .info-item .value { font-size: 22px; font-weight: 700; color: #1a237e; }
  .info-item .unit { font-size: 12px; color: #666; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #43a047, #66bb6a);
    color: white;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 8px;
  }
  .footer {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-top: 16px;
    border-top: 1px solid #eee;
    padding-top: 16px;
  }
</style>
</head>
